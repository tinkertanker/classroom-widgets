# ============================================
# Production Docker Compose
# ============================================
# Usage: docker compose --env-file .env.production -f docker-compose.prod.yml up -d
# Requires: .env.production file with real secrets

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.prod
      args:
        # Build-time variables (baked into the image)
        - VITE_SERVER_URL=${VITE_SERVER_URL}
        - VITE_SHORTIO_API_KEY=${VITE_SHORTIO_API_KEY}
        - VITE_SHORTIO_BASE_URL=${VITE_SHORTIO_BASE_URL}
        - VITE_SHORTIO_DOMAIN=${VITE_SHORTIO_DOMAIN}
        - VITE_UMAMI_SCRIPT_URL=${VITE_UMAMI_SCRIPT_URL}
        - VITE_UMAMI_WEBSITE_ID=${VITE_UMAMI_WEBSITE_ID}
    image: classroom-widgets-frontend:latest
    container_name: classroom-widgets-frontend
    ports:
      - "127.0.0.1:8080:80"
    networks:
      - classroom-widgets-prod
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:80"]
      interval: 30s
      timeout: 10s
      retries: 3

  backend:
    build:
      context: .
      dockerfile: packages/server/Dockerfile.prod
    container_name: classroom-widgets-backend
    image: classroom-widgets-backend:latest
    ports:
      - "127.0.0.1:3001:3001"
    environment:
      # Application configuration
      - NODE_ENV=production
      - PORT=3001
      - CORS_ORIGINS=${CORS_ORIGINS}
      - STUDENT_APP_URL=${STUDENT_APP_URL}
    networks:
      - classroom-widgets-prod
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================
  # Umami Analytics (Privacy-focused)
  # ============================================
  umami:
    profiles:
      - analytics
    image: ghcr.io/umami-software/umami:postgresql-latest
    container_name: classroom-widgets-umami
    ports:
      - "127.0.0.1:3003:3000"
    environment:
      - DATABASE_URL=postgresql://${UMAMI_DB_USER:-umami}:${UMAMI_DB_PASSWORD}@umami-db:5432/umami
      - DATABASE_TYPE=postgresql
      - APP_SECRET=${UMAMI_APP_SECRET}
    depends_on:
      umami-db:
        condition: service_healthy
    networks:
      - classroom-widgets-prod
    restart: unless-stopped

  umami-db:
    profiles:
      - analytics
    image: postgres:15-alpine
    container_name: classroom-widgets-umami-db
    environment:
      - POSTGRES_DB=umami
      - POSTGRES_USER=${UMAMI_DB_USER:-umami}
      - POSTGRES_PASSWORD=${UMAMI_DB_PASSWORD}
    volumes:
      - umami-db-data:/var/lib/postgresql/data
    networks:
      - classroom-widgets-prod
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${UMAMI_DB_USER:-umami}"]
      interval: 5s
      timeout: 5s
      retries: 5

networks:
  classroom-widgets-prod:
    driver: bridge

volumes:
  umami-db-data:
